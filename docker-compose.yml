services:
  app:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Optional: run the scraper on a schedule inside Docker
  # Uncomment to enable automated scraping every 3 hours
  # cron:
